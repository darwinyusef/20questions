services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - sqlite_data:/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_DIR=/data
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sqlite_data:
    driver: local
